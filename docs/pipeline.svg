  <text x="270" y="56" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="10" fill="#94a3b8">purple-loop pipeline  ·  LogNorm highlighted</text>

  <!-- Pipeline label row -->
  <text x="270" y="280" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#3b3560">
    simulate → normalize → cluster → hunt → drift → repeat
  </text>

